version: "3.9"

services:

  # PostgreSQL database container
  db:
    image: postgres:16-alpine
    container_name: jobtracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 5433 on host so it doesn't conflict with your local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI application container
  api:
    build: .
    container_name: jobtracker_api
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/jobtracker
      SECRET_KEY: supersecretkey-change-this-in-production-make-it-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy  # wait for DB to be ready before starting API
    volumes:
      - .:/app  # mount code for development — remove in production

volumes:
  postgres_data:  # named volume — data persists even if container is deleted